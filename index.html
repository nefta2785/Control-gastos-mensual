document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

te: 'Día 30' },\n    ],\n    fijosQ30: [\n      { key: 'q30_renta', name: 'Renta (50%)', amount: 2925, date: 'Día 1' },\n      { key: 'q30_internet', name: 'Internet', amount: 350, date: 'Día 1' },\n      { key: 'q30_spotify', name: 'Spotify', amount: 90, date: 'Día 1' },\n      { key: 'q30_claude', name: 'Claude', amount: 200, date: 'Día 6' },\n    ],\n  };\n\n  BIMES_Q15 = [\n    { key: 'q15_agua', name: 'Agua', amount: 33, date: 'Día 16' },\n    { key: 'q15_gas', name: 'Gas', amount: 350, date: 'Día 16' },\n  ];\n  BIMES_Q30 = [{ key: 'q30_luz', name: 'Luz', amount: 350, date: 'Día 14' }];\n  CATS = ['Alimentación / súper','Restaurantes','Transporte','Miscelánea','Telefonía','Compras personales','Regalos / ocio','Salud','Otro'];\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem('finplan:v1');\n      if (raw) {\n        const saved = JSON.parse(raw);\n        if (saved && typeof saved === 'object') this.setState(saved);\n      }\n    } catch (e) {}\n    if (this.props.initialTheme && this.props.initialTheme !== this.state.theme) this.setState({ theme: this.props.initialTheme });\n  }\n  componentDidUpdate() { this.persist(); }\n  persist() {\n    try {\n      const s = this.state;\n      const data = {\n        theme: s.theme, q15: s.q15, q30: s.q30, bim: s.bim,\n        gastos: s.gastos, deudas: s.deudas, checked: s.checked,\n        varsQ15: s.varsQ15, varsQ30: s.varsQ30,\n        fijosQ15: s.fijosQ15, fijosQ30: s.fijosQ30, fijoSeq: s.fijoSeq,\n      };\n      localStorage.setItem('finplan:v1', JSON.stringify(data));\n    } catch (e) {}\n  }\n  fmt(n) { return '$' + Math.round(n).toLocaleString('es-MX'); }\n  fmtK(n) { return n >= 1000 ? '$' + (n / 1000).toFixed(1) + 'k' : '$' + Math.round(n); }\n  pct(p, t) { return t > 0 ? Math.min(100, Math.round(p / t * 100)) : 0; }\n  sum(a) { return a.reduce((x, y) => x + y.amount, 0); }\n  getFijos(q) {\n    const b = this.state.bim;\n    const base = q === 'q15' ? this.state.fijosQ15 : this.state.fijosQ30;\n    const bim = q === 'q15' ? this.BIMES_Q15 : this.BIMES_Q30;\n    const norm = base.map(f => ({ ...f, amount: parseFloat(f.amount) || 0 }));\n    return b ? [...norm, ...bim] : norm;\n  }\n  setFijo(q, i, field, val) {\n    const key = q === 'q15' ? 'fijosQ15' : 'fijosQ30';\n    this.setState(s => ({ [key]: s[key].map((f, x) => x === i ? { ...f, [field]: val } : f) }));\n  }\n  addFijo(q) {\n    const key = q === 'q15' ? 'fijosQ15' : 'fijosQ30';\n    this.setState(s => {\n      const id = s.fijoSeq + 1;\n      return { fijoSeq: id, [key]: [...s[key], { key: q + '_n' + id, name: '', amount: '', date: 'Día 1' }] };\n    });\n  }\n  delFijo(q, i) {\n    const key = q === 'q15' ? 'fijosQ15' : 'fijosQ30';\n    this.setState(s => ({ [key]: s[key].filter((_, x) => x !== i) }));\n  }\n  income(q) { return parseFloat(this.state[q]) || 0; }\n  spentCat(q, name) { return this.state.gastos.filter(g => g.q === q && g.cat === name).reduce((a, g) => a + g.monto, 0); }\n  spentTotal(q) { return this.state.gastos.filter(g => g.q === q).reduce((a, g) => a + g.monto, 0); }\n  // Costo \"envelope\": cada categoría cuesta max(presupuesto, gasto real).\n  // Gastar de menos NO sube el ahorro (el presupuesto ya estaba apartado);\n  // gastar de más SÍ lo baja por el excedente.\n  varCost(q) {\n    const vars = q === 'q15' ? this.state.varsQ15 : this.state.varsQ30;\n    const names = vars.map(v => v.name);\n    let cost = vars.reduce((a, v) => a + Math.max(parseFloat(v.budget) || 0, this.spentCat(q, v.name)), 0);\n    // Gasto en categorías sin presupuesto definido cuenta a su valor real.\n    cost += this.state.gastos.filter(g => g.q === q && !names.includes(g.cat)).reduce((a, g) => a + g.monto, 0);\n    return cost;\n  }\n  varOver(q) {\n    const vars = q === 'q15' ? this.state.varsQ15 : this.state.varsQ30;\n    return vars.reduce((a, v) => a + Math.max(0, this.spentCat(q, v.name) - (parseFloat(v.budget) || 0)), 0);\n  }\n  debtTotal(q) { return this.state.deudas.filter(d => d.q === q).reduce((a, d) => a + d.monto, 0); }\n\n  toggleFijo(k) { this.setState(s => ({ checked: { ...s.checked, [k]: !s.checked[k] } })); }\n  setTab(t) { this.setState({ tab: t }); }\n  toggleTheme() { this.setState(s => ({ theme: s.theme === 'light' ? 'dark' : 'light' })); }\n  setGForm(p) { this.setState(s => ({ gForm: { ...s.gForm, ...p } })); }\n  setBudget(q, i, val) {\n    const key = q === 'q15' ? 'varsQ15' : 'varsQ30';\n    this.setState(s => ({ [key]: s[key].map((v, x) => x === i ? { ...v, budget: val } : v) }));\n  }\n  setDForm(p) { this.setState(s => ({ dForm: { ...s.dForm, ...p } })); }\n\n  registrar() {\n    const f = this.state.gForm; const m = parseFloat(f.monto);\n    if (!m || m <= 0) return;\n    const now = new Date();\n    const fecha = now.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });\n    this.setState(s => ({ gastos: [...s.gastos, { q: f.q, cat: f.cat, monto: m, desc: f.desc.trim(), fecha, ts: now.getTime() }], gForm: { ...s.gForm, monto: '', desc: '' } }));\n  }\n  delGasto(i) { this.setState(s => ({ gastos: s.gastos.filter((_, x) => x !== i) })); }\n  registrarDeuda() {\n    const f = this.state.dForm; const m = parseFloat(f.monto);\n    if (!f.concepto.trim() || !m || m <= 0) return;\n    this.setState(s => ({ deudas: [...s.deudas, { concepto: f.concepto.trim(), monto: m, fecha: f.fecha.trim() || 'Sin fecha', q: f.q }], dForm: { concepto: '', monto: '', fecha: '', q: 'q15' } }));\n  }\n  delDeuda(i) { this.setState(s => ({ deudas: s.deudas.filter((_, x) => x !== i) })); }\n\n  csvCell(v) {\n    const s = String(v == null ? '' : v);\n    return /[\",\\n;]/.test(s) ? '\"' + s.replace(/\"/g, '\"\"') + '\"' : s;\n  }\n  exportExcel() {\n    const rows = [['Tipo', 'Fecha', 'Quincena', 'Categoría / Concepto', 'Descripción', 'Monto']];\n    const ordered = [...this.state.gastos].sort((a, b) => (a.ts || 0) - (b.ts || 0));\n    ordered.forEach(g => rows.push(['Gasto', g.fecha || '', g.q.toUpperCase(), g.cat, g.desc || '', g.monto]));\n    this.state.deudas.forEach(d => rows.push(['Compromiso', d.fecha || '', d.q.toUpperCase(), d.concepto, '', d.monto]));\n    const totalG = this.state.gastos.reduce((a, g) => a + g.monto, 0);\n    const totalD = this.state.deudas.reduce((a, d) => a + d.monto, 0);\n    rows.push([]);\n    rows.push(['', '', '', '', 'Total gastos', totalG]);\n    rows.push(['', '', '', '', 'Total compromisos', totalD]);\n    const sep = 'sep=,\\n';\n    const body = rows.map(r => r.map(c => this.csvCell(c)).join(',')).join('\\r\\n');\n    const blob = new Blob(['\\uFEFF' + sep + body], { type: 'text/csv;charset=utf-8;' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    const stamp = new Date().toISOString().slice(0, 10);\n    a.href = url;\n    a.download = 'finplan-movimientos-' + stamp + '.csv';\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n\n  pal() {\n    return this.state.theme === 'light'\n      ? { accent: '#5b5bf0', green: '#0fae73', red: '#ef4d62', amber: '#e08a14', purple: '#7c5cf6', sub: '#c7c9f5', renta: '#5b5bf0', vars: '#34c97e', comp: '#7c5cf6', ahorro: '#0fae73', subs: '#f0a83a' }\n      : { accent: '#7c7cff', green: '#1fc285', red: '#ff5f72', amber: '#f5ad3c', purple: '#a78bfa', sub: '#3a3f6b', renta: '#7c7cff', vars: '#1fc285', comp: '#a78bfa', ahorro: '#1fc285', subs: '#f5ad3c' };\n  }\n\n  tokens() {\n    const L = this.state.theme === 'light';\n    const v = L\n      ? { bg: '#eef0f6', card: '#ffffff', card2: '#f5f6fb', text: '#15172b', muted: '#888ca3', border: '#eceef4', accent: '#5b5bf0', accentInk: '#ffffff', green: '#0fae73', red: '#ef4d62', amber: '#e08a14', purple: '#7c5cf6', amberBg: 'rgba(224,138,20,.12)', shadow: '0 4px 22px -8px rgba(40,40,90,.14)', hero1: '#6366f1', hero2: '#8b5cf6', heroShadow: 'rgba(99,102,241,.45)', navBg: 'rgba(255,255,255,.85)' }\n      : { bg: '#0a0c16', card: '#15172a', card2: '#1d2038', text: '#eceefb', muted: '#7e83a0', border: '#272b48', accent: '#7c7cff', accentInk: '#0a0c16', green: '#1fc285', red: '#ff5f72', amber: '#f5ad3c', purple: '#a78bfa', amberBg: 'rgba(245,173,60,.14)', shadow: '0 8px 28px -12px rgba(0,0,0,.6)', hero1: '#6366f1', hero2: '#8b5cf6', heroShadow: 'rgba(99,102,241,.5)', navBg: 'rgba(13,15,28,.8)' };\n    return `--bg:${v.bg};--card:${v.card};--card2:${v.card2};--text:${v.text};--muted:${v.muted};--border:${v.border};--accent:${v.accent};--accent-ink:${v.accentInk};--green:${v.green};--red:${v.red};--amber:${v.amber};--purple:${v.purple};--amber-bg:${v.amberBg};--shadow:${v.shadow};--hero1:${v.hero1};--hero2:${v.hero2};--hero-shadow:${v.heroShadow};--nav-bg:${v.navBg};--font:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace`;\n  }\n\n  computeQuincena(q) {\n    const fijos = this.getFijos(q);\n    const vars = q === 'q15' ? this.state.varsQ15 : this.state.varsQ30;\n    const ing = this.income(q);\n    const totalF = this.sum(fijos);\n    const gastVar = this.varCost(q);\n    const over = this.varOver(q);\n    const totalD = this.debtTotal(q);\n    const totalG = totalF + gastVar;\n    const ahorro = ing - totalG;\n    const neto = ahorro - totalD;\n    const pExec = this.pct(totalG + totalD, ing);\n    const cc = fijos.filter(f => this.state.checked[f.key]).length;\n    const P = this.pal();\n    return {\n      label: q.toUpperCase(),\n      periodo: q === 'q15' ? 'Cubre días 16 – 30' : 'Cubre días 1 – 15',\n      incomeFmt: this.fmt(ing),\n      totalGFmt: this.fmtK(totalG),\n      pctExec: pExec,\n      pctColor: pExec > 90 ? 'var(--red)' : pExec > 75 ? 'var(--amber)' : 'var(--text)',\n      ahorroFmt: this.fmtK(Math.max(0, neto)),\n      ahorroColor: neto < 0 ? 'var(--red)' : 'var(--green)',\n      progressCount: cc, progressTotal: fijos.length,\n      progressPct: (fijos.length ? Math.round(cc / fijos.length * 100) : 0) + '%',\n      fijos: fijos.map(f => {\n        const on = !!this.state.checked[f.key];\n        return {\n          name: f.name, date: f.date, amountFmt: this.fmt(f.amount),\n          tick: on ? '✓' : '', ringColor: on ? 'var(--green)' : 'var(--border)',\n          fillColor: on ? 'var(--green)' : 'transparent',\n          nameColor: on ? 'var(--muted)' : 'var(--text)',\n          strike: on ? 'line-through' : 'none',\n          amtColor: on ? 'var(--muted)' : 'var(--text)',\n          onToggle: () => this.toggleFijo(f.key),\n        };\n      }),\n      vars: vars.map(v => {\n        const budget = parseFloat(v.budget) || 0;\n        const g = this.spentCat(q, v.name);\n        const resta = budget - g;\n        const pp = this.pct(g, budget);\n        return {\n          name: v.name, budgetFmt: this.fmt(budget),\n          remainFmt: resta < 0 ? '⚠ ' + this.fmt(Math.abs(resta)) : this.fmt(resta) + ' libre',\n          remainColor: resta < 0 ? 'var(--red)' : 'var(--muted)',\n          pctWidth: Math.min(100, pp) + '%',\n          barColor: pp >= 100 ? 'var(--red)' : pp >= 80 ? 'var(--amber)' : 'var(--green)',\n        };\n      }),\n      hasDeudas: totalD > 0,\n      deudas: this.state.deudas.filter(d => d.q === q).map(d => ({ concepto: d.concepto, fecha: d.fecha, amountFmt: this.fmt(d.monto) })),\n      boxBg: neto >= 0 ? 'rgba(15,174,115,.10)' : 'rgba(239,77,98,.10)',\n      boxBorder: neto >= 0 ? 'rgba(15,174,115,.3)' : 'rgba(239,77,98,.3)',\n      boxLabel: neto >= 0 ? 'Ahorro bruto ' + q.toUpperCase() : 'Déficit en ' + q.toUpperCase(),\n      boxLabelColor: neto >= 0 ? 'var(--green)' : 'var(--red)',\n      boxAmtFmt: this.fmt(Math.abs(neto)),\n      hasOver: over > 0,\n      overFmt: this.fmt(over),\n      hasDebtLine: totalD > 0,\n      debtLineFmt: this.fmt(totalD),\n    };\n  }\n\n  computeResumen() {\n    const fq15 = this.getFijos('q15'), fq30 = this.getFijos('q30');\n    const totalF = this.sum(fq15) + this.sum(fq30);\n    const totalV = this.varCost('q15') + this.varCost('q30');\n    const totalD = this.debtTotal('q15') + this.debtTotal('q30');\n    const ing = this.income('q15') + this.income('q30');\n    const ahQ15 = this.income('q15') - this.sum(fq15) - this.varCost('q15');\n    const ahQ30 = this.income('q30') - this.sum(fq30) - this.varCost('q30');\n    const ahBruto = ahQ15 + ahQ30;\n    const ahNeto = ahBruto - totalD;\n    const P = this.pal();\n    const renta = 5850;\n    const segs = [\n      { label: 'Servicios y subs', amount: Math.max(0, totalF - renta), color: P.subs },\n      { label: 'Gastos variables', amount: totalV, color: P.vars },\n      { label: 'Renta', amount: renta, color: P.renta },\n      { label: 'Compromisos', amount: totalD, color: P.comp },\n      { label: 'Ahorro neto', amount: Math.max(0, ahNeto), color: P.ahorro },\n    ];\n    const tot = segs.reduce((a, s) => a + s.amount, 0) || 1;\n    let acc = 0; const stops = [];\n    segs.forEach(s => { const st = acc / tot * 100; acc += s.amount; const en = acc / tot * 100; stops.push(`${s.color} ${st}% ${en}%`); });\n    return {\n      netoFmt: this.fmt(Math.max(0, ahNeto)),\n      netoShort: this.fmtK(Math.max(0, ahNeto)),\n      netoPct: this.pct(Math.max(0, ahNeto), ing),\n      incomeFmt: this.fmt(ing),\n      fijosFmt: this.fmt(totalF),\n      varsFmt: this.fmt(totalV),\n      compFmt: this.fmt(totalD),\n      donut: `conic-gradient(${stops.join(',')})`,\n      legend: segs.map(s => ({ label: s.label, amountFmt: this.fmt(s.amount), color: s.color })),\n      savings: [\n        { label: 'Ahorro bruto Q15', amountFmt: this.fmt(Math.max(0, ahQ15)), color: ahQ15 < 0 ? 'var(--red)' : 'var(--green)' },\n        { label: 'Ahorro bruto Q30', amountFmt: this.fmt(Math.max(0, ahQ30)), color: ahQ30 < 0 ? 'var(--red)' : 'var(--green)' },\n        { label: 'Compromisos de pago', amountFmt: '− ' + this.fmt(totalD), color: 'var(--purple)' },\n      ],\n    };\n  }\n\n  segBtn(active, kind) {\n    const on = active === kind;\n    return {\n      border: on ? 'var(--accent)' : 'var(--border)',\n      bg: on ? 'var(--accent)' : 'transparent',\n      color: on ? 'var(--accent-ink)' : 'var(--muted)',\n    };\n  }\n\n  renderVals() {\n    const t = this.state.tab;\n    const gf = this.state.gForm, df = this.state.dForm;\n    const gq15 = this.segBtn(gf.q, 'q15'), gq30 = this.segBtn(gf.q, 'q30');\n    const dq15 = this.segBtn(df.q, 'q15'), dq30 = this.segBtn(df.q, 'q30');\n    return {\n      rootStyle: this.tokens(),\n      isLight: this.state.theme === 'light',\n      isDark: this.state.theme === 'dark',\n      toggleTheme: () => this.toggleTheme(),\n      isResumen: t === 'resumen',\n      isQuincena: t === 'q15' || t === 'q30',\n      isReg: t === 'reg', isDeudas: t === 'deudas', isAjustes: t === 'ajustes',\n      goResumen: () => this.setTab('resumen'),\n      goQ15: () => this.setTab('q15'),\n      goQ30: () => this.setTab('q30'),\n      goReg: () => this.setTab('reg'),\n      goDeudas: () => this.setTab('deudas'),\n      goAjustes: () => this.setTab('ajustes'),\n      exportExcel: () => this.exportExcel(),\n      nav: {\n        resumen: t === 'resumen' ? 'var(--accent)' : 'var(--muted)',\n        q15: t === 'q15' ? 'var(--accent)' : 'var(--muted)',\n        q30: t === 'q30' ? 'var(--accent)' : 'var(--muted)',\n        deudas: t === 'deudas' ? 'var(--accent)' : 'var(--muted)',\n      },\n      r: this.computeResumen(),\n      q: (t === 'q15' || t === 'q30') ? this.computeQuincena(t) : this.computeQuincena('q15'),\n      gForm: {\n        cat: gf.cat, monto: gf.monto, desc: gf.desc, cats: this.CATS,\n        open: this.state.catOpen,\n        caret: this.state.catOpen ? '▲' : '▼',\n        toggle: () => this.setState(s => ({ catOpen: !s.catOpen })),\n        catItems: this.CATS.map(c => ({\n          name: c,\n          tick: c === gf.cat ? '✓' : '',\n          color: c === gf.cat ? 'var(--accent)' : 'var(--text)',\n          bg: c === gf.cat ? 'rgba(99,102,241,.08)' : 'transparent',\n          onPick: () => this.setState(s => ({ gForm: { ...s.gForm, cat: c }, catOpen: false })),\n        })),\n        q15Border: gq15.border, q15Bg: gq15.bg, q15Color: gq15.color,\n        q30Border: gq30.border, q30Bg: gq30.bg, q30Color: gq30.color,\n        setQ15: () => this.setGForm({ q: 'q15' }),\n        setQ30: () => this.setGForm({ q: 'q30' }),\n        onCat: e => this.setGForm({ cat: e.target.value }),\n        onMonto: e => this.setGForm({ monto: e.target.value }),\n        onDesc: e => this.setGForm({ desc: e.target.value }),\n        submit: () => this.registrar(),\n      },\n      hasGastos: this.state.gastos.length > 0,\n      noGastos: this.state.gastos.length === 0,\n      gastos: [...this.state.gastos].map((g, i) => ({ g, i })).reverse().map(({ g, i }) => ({\n        title: g.desc || g.cat, cat: g.cat, qLabel: g.q.toUpperCase(),\n        qColor: g.q === 'q15' ? 'var(--accent)' : 'var(--amber)',\n        fecha: g.fecha || '—',\n        amountFmt: this.fmt(g.monto), onDelete: () => this.delGasto(i),\n      })),\n      dForm: {\n        concepto: df.concepto, monto: df.monto, fecha: df.fecha,\n        q15Border: dq15.border, q15Bg: dq15.bg, q15Color: dq15.color,\n        q30Border: dq30.border, q30Bg: dq30.bg, q30Color: dq30.color,\n        setQ15: () => this.setDForm({ q: 'q15' }),\n        setQ30: () => this.setDForm({ q: 'q30' }),\n        onConcepto: e => this.setDForm({ concepto: e.target.value }),\n        onMonto: e => this.setDForm({ monto: e.target.value }),\n        onFecha: e => this.setDForm({ fecha: e.target.value }),\n        submit: () => this.registrarDeuda(),\n      },\n      hasDeudas: this.state.deudas.length > 0,\n      noDeudas: this.state.deudas.length === 0,\n      deudas: this.state.deudas.map((d, i) => ({\n        concepto: d.concepto, fecha: d.fecha, qLabel: d.q.toUpperCase(),\n        amountFmt: this.fmt(d.monto), onDelete: () => this.delDeuda(i),\n      })),\n      aForm: {\n        q15: this.state.q15, q30: this.state.q30,\n        onQ15: e => this.setState({ q15: e.target.value }),\n        onQ30: e => this.setState({ q30: e.target.value }),\n        toggleBim: () => this.setState(s => ({ bim: !s.bim })),\n        bimTrack: this.state.bim ? 'var(--accent)' : 'var(--border)',\n        bimX: this.state.bim ? '24px' : '3px',\n        varsQ15: this.state.varsQ15.map((v, i) => ({ name: v.name, budget: v.budget, onBudget: e => this.setBudget('q15', i, e.target.value) })),\n        varsQ30: this.state.varsQ30.map((v, i) => ({ name: v.name, budget: v.budget, onBudget: e => this.setBudget('q30', i, e.target.value) })),\n        totalQ15Fmt: this.fmt(this.state.varsQ15.reduce((a, v) => a + (parseFloat(v.budget) || 0), 0)),\n        totalQ30Fmt: this.fmt(this.state.varsQ30.reduce((a, v) => a + (parseFloat(v.budget) || 0), 0)),\n        fijosQ15: this.state.fijosQ15.map((f, i) => ({\n          name: f.name, amount: f.amount, date: f.date,\n          onName: e => this.setFijo('q15', i, 'name', e.target.value),\n          onAmount: e => this.setFijo('q15', i, 'amount', e.target.value),\n          onDate: e => this.setFijo('q15', i, 'date', e.target.value),\n          onDelete: () => this.delFijo('q15', i),\n        })),\n        fijosQ30: this.state.fijosQ30.map((f, i) => ({\n          name: f.name, amount: f.amount, date: f.date,\n          onName: e => this.setFijo('q30', i, 'name', e.target.value),\n          onAmount: e => this.setFijo('q30', i, 'amount', e.target.value),\n          onDate: e => this.setFijo('q30', i, 'date', e.target.value),\n          onDelete: () => this.delFijo('q30', i),\n        })),\n        totalFijoQ15Fmt: this.fmt(this.state.fijosQ15.reduce((a, f) => a + (parseFloat(f.amount) || 0), 0)),\n        totalFijoQ30Fmt: this.fmt(this.state.fijosQ30.reduce((a, f) => a + (parseFloat(f.amount) || 0), 0)),\n        addFijoQ15: () => this.addFijo('q15'),\n        addFijoQ30: () => this.addFijo('q30'),\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
